<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="100" height="100" rx="16" fill="#0d0d0e"/>
  <!-- Hexagon outline (flat-top, amber) -->
  <polygon
    points="50,8 88,29 88,71 50,92 12,71 12,29"
    stroke="#f0a500"
    stroke-width="6"
    stroke-linejoin="round"
    fill="none"
  />
  <!-- H letterform matching logo-h.png -->
  <rect x="30" y="30" width="10" height="40" fill="#f0a500"/>
  <rect x="60" y="30" width="10" height="40" fill="#f0a500"/>
  <rect x="30" y="45" width="40" height="10" fill="#f0a500"/>
</svg>
